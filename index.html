<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKONTEL — Unified Lending Lifecycle & Recovery Command</title>
    
    <style>
        /* Fallback dark background and text color in case Tailwind CDN fails to load */
        body, html {
            background-color: #030712 !important;
            color: #f8fafc !important;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #app {
            background-color: #030712 !important;
        }
    </style>

    <script>
        // Global Error Catcher to help debug runtime/loading issues on different environments
        window.addEventListener('error', function(e) {
            console.error("Global Error Caught: ", e.message);
            const app = document.getElementById("app");
            if (app) {
                app.innerHTML = `
                    <div style="min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; background-color: #030712; padding: 24px; box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #f8fafc;">
                        <div style="max-width: 448px; width: 100%; background-color: #0f172a; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 16px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
                            <h2 style="color: #f87171; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                                ⚠️ System Boot Exception
                            </h2>
                            <p style="font-size: 12px; color: #cbd5e1; line-height: 1.625; margin-bottom: 16px;">
                                The application failed to load a critical module. This usually happens due to browser CORS policies when opening index.html directly via double-click, or if the CDN files are blocked by network security policies.
                            </p>
                            <div style="background-color: rgba(0, 0, 0, 0.4); border: 1px solid #1e293b; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 10px; color: #fca5a5; word-break: break-all; line-height: 1.5;">
                                <strong>Error:</strong> ${e.message}<br>
                                <strong>File:</strong> ${e.filename || 'unknown'}<br>
                                <strong>Line:</strong> ${e.lineno || '0'}
                            </div>
                            <p style="font-size: 10px; color: #64748b; margin-top: 16px; margin-bottom: 0; line-height: 1.5;">
                                Recommendation: Please make sure you open <a href="http://localhost:8000" style="color: #22d3ee; font-weight: bold; text-decoration: underline;">http://localhost:8000</a> in your browser. If you already did, check the console using F12 for details.
                            </p>
                        </div>
                    </div>
                `;
            }
        });
    </script>

    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>

    <!-- ApexCharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS Animations & Scrollbars -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="h-full bg-slate-950 text-slate-100 overflow-hidden font-sans select-none antialiased">

    <!-- Master Application View Mount -->
    <div id="app" class="h-full w-full">
        <!-- Renders Login or App Shell Layout dynamically -->
        <div class="h-screen w-screen bg-slate-950 flex items-center justify-center">
            <div class="flex flex-col items-center gap-4 text-center">
                <!-- Big iKonTel Logo -->
                <div class="w-20 h-20 rounded-2xl bg-slate-900/50 flex items-center justify-center border border-indigo-500/20 shadow-lg animate-pulse p-2">
                    <img src="https://www.ikontel.com/assets/img/logo/iKonTel-logo.png" class="h-10 w-auto object-contain" alt="iKonTel">
                </div>
                <div>
                    <h1 class="text-sm font-bold text-white tracking-widest uppercase">IKONTEL</h1>
                    <p class="text-[10px] text-teal-400 font-bold tracking-widest mt-1 uppercase">BOOTING AI COMMAND CONSOLE...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Script Shell -->
    <script type="module" src="app.js"></script>

</body>
</html>
